<!DOCTYPE html>
<html>
  <head>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: black;
      }
      video {
        width: 100vw;
        height: 100vh;
        object-fit: cover;
      }
    </style>
  </head>
  <body>
    <video autoplay muted playsinline id="introVideo">
      <source src="intro.mp4" type="video/mp4" />
    </video>

    <script>
      const { ipcRenderer } = require("electron");

      const video = document.getElementById("introVideo");
      video.onended = () => {
        ipcRenderer.send("intro-finished");
      };
    </script>
  </body>
</html>
