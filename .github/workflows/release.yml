name: Release Desktop App

on:
  push:
    branches:
      - main
    paths-ignore:
      - "src/main/update-policy.json"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.release_check.outputs.should_release }}
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      channel: ${{ steps.meta.outputs.channel }}
      release_name: ${{ steps.meta.outputs.release_name }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Compute release metadata
        id: meta
        shell: bash
        run: |
          base_version=$(node -p "require('./package.json').version")
          channel="latest"
          version="${base_version}"

          {
            echo "version=${version}"
            echo "tag=v${version}"
            echo "channel=${channel}"
            echo "release_name=Desktop ${GITHUB_REF_NAME} ${version}"
          } >> "$GITHUB_OUTPUT"

      - name: Check existing release version
        id: release_check
        shell: bash
        run: |
          tag="${{ steps.meta.outputs.tag }}"
          existing_tag=$(git ls-remote --tags origin "refs/tags/${tag}")

          if [ -n "${existing_tag}" ]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "Release skipped because tag ${tag} already exists on origin." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "Release will continue for new tag ${tag}." >> "$GITHUB_STEP_SUMMARY"
          fi

  build-windows:
    needs: prepare-release
    if: needs.prepare-release.outputs.should_release == 'true'
    runs-on: windows-2025

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn --frozen-lockfile

      - name: Build Windows app
        shell: pwsh
        env:
          APP_RELEASE_CHANNEL: ${{ needs.prepare-release.outputs.channel }}
          APP_ENABLE_DEVTOOLS: "false"
        run: |
          yarn build
          npx electron-builder --win --publish never `
            --config.extraMetadata.version=${{ needs.prepare-release.outputs.version }} `
            --config.extraMetadata.releaseChannel=${{ needs.prepare-release.outputs.channel }} `
            --config.publish.channel=${{ needs.prepare-release.outputs.channel }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          if-no-files-found: error
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/*.yml

  build-linux:
    needs: prepare-release
    if: needs.prepare-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn --frozen-lockfile

      - name: Build Linux AppImage and DEB
        env:
          APP_RELEASE_CHANNEL: ${{ needs.prepare-release.outputs.channel }}
          APP_ENABLE_DEVTOOLS: "false"
        run: |
          yarn build
          npx electron-builder --linux AppImage deb --publish never \
            --config.extraMetadata.version=${{ needs.prepare-release.outputs.version }} \
            --config.extraMetadata.releaseChannel=${{ needs.prepare-release.outputs.channel }} \
            --config.publish.channel=${{ needs.prepare-release.outputs.channel }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          if-no-files-found: error
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.blockmap
            dist/*.yml

  publish-release:
    needs:
      - prepare-release
      - build-windows
      - build-linux
    if: needs.prepare-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag }}
          name: ${{ needs.prepare-release.outputs.release_name }}
          target_commitish: ${{ github.sha }}
          prerelease: false
          generate_release_notes: true
          files: |
            dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
