name: Release Desktop App

on:
  push:
    branches:
      - main
      - dev

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn --frozen-lockfile

      - name: Compute release metadata
        id: meta
        shell: pwsh
        run: |
          $package = Get-Content package.json | ConvertFrom-Json
          $baseVersion = $package.version
          $isDevBranch = $env:GITHUB_REF_NAME -eq "dev"
          $channel = if ($isDevBranch) { "dev" } else { "latest" }
          $version = if ($isDevBranch) {
            "$baseVersion-dev.$($env:GITHUB_RUN_NUMBER).$($env:GITHUB_RUN_ATTEMPT)"
          } else {
            $baseVersion
          }
          $tag = "v$version"
          $releaseName = "Desktop $($env:GITHUB_REF_NAME) $version"
          $enableDevTools = if ($isDevBranch) { "true" } else { "false" }
          $isPrerelease = if ($isDevBranch) { "true" } else { "false" }

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "channel=$channel" >> $env:GITHUB_OUTPUT
          "release_name=$releaseName" >> $env:GITHUB_OUTPUT
          "enable_devtools=$enableDevTools" >> $env:GITHUB_OUTPUT
          "is_prerelease=$isPrerelease" >> $env:GITHUB_OUTPUT

      - name: Check existing release version
        id: release_check
        shell: pwsh
        run: |
          $tag = "${{ steps.meta.outputs.tag }}"
          $existingTag = git ls-remote --tags origin "refs/tags/$tag"

          if ($existingTag) {
            "should_release=false" >> $env:GITHUB_OUTPUT
            "Release skipped because tag $tag already exists on origin." >> $env:GITHUB_STEP_SUMMARY
          } else {
            "should_release=true" >> $env:GITHUB_OUTPUT
            "Release will continue for new tag $tag." >> $env:GITHUB_STEP_SUMMARY
          }

      - name: Build app
        if: steps.release_check.outputs.should_release == 'true'
        shell: pwsh
        env:
          APP_RELEASE_CHANNEL: ${{ steps.meta.outputs.channel }}
          APP_ENABLE_DEVTOOLS: ${{ steps.meta.outputs.enable_devtools }}
        run: |
          yarn build
          npx electron-builder --win --publish never `
            --config.extraMetadata.version=${{ steps.meta.outputs.version }} `
            --config.extraMetadata.releaseChannel=${{ steps.meta.outputs.channel }} `
            --config.publish.channel=${{ steps.meta.outputs.channel }}

      - name: Publish GitHub release
        if: steps.release_check.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.release_name }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ steps.meta.outputs.is_prerelease }}
          generate_release_notes: true
          files: |
            dist/*.exe
            dist/*.blockmap
            dist/*.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
